@if (getLocalizedAbstract(); as abstract) {
<div class="simple-view-element">
    <ds-truncatable [showToggle]="true" [id]="'abstractOuter'">
        <h5 class="simple-view-element-header">Abstract</h5>
        <div class="justify-content-between mb-4 itempage-abstract">
            <ds-truncatable-part [minLines]="4" [id]="'abstractOuter'">
                <span class="justify-content-between">{{ abstract }}</span>
            </ds-truncatable-part>
        </div>
    </ds-truncatable>
</div>
}
