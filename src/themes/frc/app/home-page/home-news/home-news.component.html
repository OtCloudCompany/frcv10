<div class="home-news-content py-5 px-3 py-sm-6 px-sm-5 mt-ncs mb-4">
    <div class="container py-4">
        <div class="row align-items-center py-5">
            <div class="col-12 col-lg-8">
                <h1 class="display-4 fw-bold mb-3 hero-title">
                    {{ "site.name" | translate }}
                </h1>
                <div class="search-form-container max-width-700 bg-white p-2 rounded shadow-lg">
                    @if (isMobile$ | async) {
                    <ds-search-form [inPlaceSearch]="false" [showScopeSelector]="false"
                        [searchPlaceholder]="'home.search-form.placeholder' | translate">
                    </ds-search-form>
                    }@else{
                    <ds-search-form [inPlaceSearch]="false" [showScopeSelector]="true"
                        [searchPlaceholder]="'home.search-form.placeholder' | translate">
                    </ds-search-form>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
